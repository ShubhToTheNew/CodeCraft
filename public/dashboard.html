<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeCraftHub — Learning Management</title>
  <style>
    :root {
      --primary: #8B5CF6;
      --primary-dark: #6D28D9;
      --success: #F59E0B;
      --danger: #EF4444;
      --bg: #0f0a1a;
      --surface: #1a1229;
      --surface-2: #251a38;
      --text: #f3f0ff;
      --muted: #a89bc4;
      --border: rgba(139, 92, 246, 0.35);
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(139, 92, 246, 0.25), transparent),
        var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.25rem 3rem;
    }

    header {
      text-align: center;
      padding: 1.5rem 0 2rem;
    }

    header h1 {
      margin: 0 0 0.35rem;
      font-size: clamp(1.35rem, 4vw, 1.85rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
    }

    .panel h2 {
      margin: 0 0 1rem;
      font-size: 1.1rem;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-grid {
      display: grid;
      gap: 1rem;
    }

    @media (min-width: 640px) {
      .form-grid {
        grid-template-columns: 1fr 1fr;
      }
      .form-grid .full {
        grid-column: 1 / -1;
      }
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font: inherit;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 0.25rem;
    }

    .btn {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.1rem;
      font-weight: 600;
      font-size: 0.9rem;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      filter: brightness(1.08);
    }

    .btn-success {
      background: var(--success);
      color: #1a0a00;
    }

    .btn-success:hover:not(:disabled) {
      filter: brightness(1.06);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-danger:hover:not(:disabled) {
      filter: brightness(1.06);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover:not(:disabled) {
      color: var(--text);
      border-color: var(--primary);
    }

    #messages {
      margin-bottom: 1rem;
      min-height: 0;
    }

    .msg {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-success {
      background: rgba(245, 158, 11, 0.18);
      border: 1px solid rgba(245, 158, 11, 0.45);
      color: #fcd34d;
    }

    .msg-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.45);
      color: #fecaca;
    }

    .courses-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .courses-head h2 {
      margin: 0;
    }

    .course-grid {
      display: grid;
      gap: 1rem;
    }

    @media (min-width: 720px) {
      .course-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .course-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .card h3 {
      margin: 0;
      font-size: 1rem;
      color: #fff;
      line-height: 1.3;
    }

    .card .desc {
      margin: 0;
      font-size: 0.85rem;
      color: var(--muted);
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .meta {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .meta strong {
      color: var(--text);
      font-weight: 600;
    }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-not {
      background: rgba(139, 92, 246, 0.25);
      color: #ddd6fe;
    }

    .badge-progress {
      background: rgba(245, 158, 11, 0.25);
      color: #fde68a;
    }

    .badge-done {
      background: rgba(52, 211, 153, 0.2);
      color: #a7f3d0;
    }

    .card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.35rem;
    }

    .card-actions .btn {
      flex: 1;
      padding: 0.5rem;
      font-size: 0.8rem;
    }

    .empty {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    /* Loading overlay */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 10, 26, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    #loading-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(139, 92, 246, 0.25);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Modal */
    #modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 900;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    #modal-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 480px;
      padding: 1.25rem 1.5rem;
      margin-top: 5vh;
      box-shadow: var(--shadow);
    }

    .modal h2 {
      margin: 0 0 1rem;
      font-size: 1.15rem;
      color: var(--primary);
    }

    .modal .form-grid {
      margin-bottom: 1rem;
    }

    .modal-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: flex-end;
    }
  </style>
</head>
<body>
  <div id="loading-overlay" aria-hidden="true">
    <div class="spinner" role="status" aria-label="Loading"></div>
  </div>

  <div id="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="edit-title">
      <h2 id="edit-title">Edit course</h2>
      <form id="edit-form" class="form-grid">
        <input type="hidden" id="edit-id" />
        <div class="full">
          <label for="edit-name">Name</label>
          <input type="text" id="edit-name" required maxlength="200" autocomplete="off" />
        </div>
        <div class="full">
          <label for="edit-description">Description</label>
          <textarea id="edit-description" required maxlength="2000"></textarea>
        </div>
        <div>
          <label for="edit-target_date">Target date</label>
          <input type="date" id="edit-target_date" required />
        </div>
        <div>
          <label for="edit-status">Status</label>
          <select id="edit-status" required>
            <option value="Not Started">Not Started</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
        <div class="full meta">
          <strong>Created:</strong> <span id="edit-created_at"></span>
        </div>
        <div class="modal-footer full">
          <button type="button" class="btn btn-ghost" id="edit-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="edit-save">Save changes</button>
        </div>
      </form>
    </div>
  </div>

  <div class="wrap">
    <header>
      <h1>CodeCraftHub: Your Learning Management Platform</h1>
      <p>Track courses, dates, and progress — powered by your local API.</p>
    </header>

    <div id="messages" role="status" aria-live="polite"></div>

    <section class="panel" aria-labelledby="add-heading">
      <h2 id="add-heading">Add course</h2>
      <form id="add-form" class="form-grid" novalidate>
        <div>
          <label for="add-name">Name <span aria-hidden="true">*</span></label>
          <input type="text" id="add-name" name="name" required maxlength="200" autocomplete="off" />
        </div>
        <div>
          <label for="add-target_date">Target date <span aria-hidden="true">*</span></label>
          <input type="date" id="add-target_date" name="target_date" required />
        </div>
        <div class="full">
          <label for="add-description">Description <span aria-hidden="true">*</span></label>
          <textarea id="add-description" name="description" required maxlength="2000"></textarea>
        </div>
        <div class="full">
          <label for="add-status">Status <span aria-hidden="true">*</span></label>
          <select id="add-status" name="status" required>
            <option value="">Select status</option>
            <option value="Not Started">Not Started</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
        <div class="full actions">
          <button type="submit" class="btn btn-primary" id="add-submit">Add course</button>
        </div>
      </form>
    </section>

    <section class="panel" aria-labelledby="list-heading">
      <div class="courses-head">
        <h2 id="list-heading">Your courses</h2>
        <button type="button" class="btn btn-ghost" id="refresh-btn">Refresh</button>
      </div>
      <div id="course-list" class="course-grid" aria-busy="false"></div>
    </section>
  </div>

  <script>
    (function () {
      /** Same origin as this page (serve from http://localhost:5000/dashboard.html) */
      const API_BASE = window.location.origin + "/api/courses";

      const STATUS_OPTIONS = ["Not Started", "In Progress", "Completed"];

      const els = {
        loading: document.getElementById("loading-overlay"),
        messages: document.getElementById("messages"),
        addForm: document.getElementById("add-form"),
        courseList: document.getElementById("course-list"),
        refreshBtn: document.getElementById("refresh-btn"),
        modalBackdrop: document.getElementById("modal-backdrop"),
        editForm: document.getElementById("edit-form"),
        editId: document.getElementById("edit-id"),
        editName: document.getElementById("edit-name"),
        editDescription: document.getElementById("edit-description"),
        editTarget: document.getElementById("edit-target_date"),
        editStatus: document.getElementById("edit-status"),
        editCreated: document.getElementById("edit-created_at"),
        editCancel: document.getElementById("edit-cancel"),
      };

      let loadingCount = 0;

      function setLoading(on) {
        loadingCount += on ? 1 : -1;
        if (loadingCount < 0) loadingCount = 0;
        const show = loadingCount > 0;
        els.loading.classList.toggle("visible", show);
        els.loading.setAttribute("aria-hidden", show ? "false" : "true");
        els.courseList.setAttribute("aria-busy", show ? "true" : "false");
      }

      function clearMessages() {
        els.messages.innerHTML = "";
      }

      function showMessage(text, type) {
        const div = document.createElement("div");
        div.className = "msg " + (type === "success" ? "msg-success" : "msg-error");
        div.textContent = text;
        els.messages.appendChild(div);
        if (type === "success") {
          setTimeout(function () {
            if (div.parentNode) div.remove();
          }, 4500);
        }
      }

      async function parseJsonResponse(res) {
        const text = await res.text();
        if (!text) return {};
        try {
          return JSON.parse(text);
        } catch {
          return { error: text || res.statusText };
        }
      }

      async function apiRequest(method, url, body) {
        setLoading(true);
        try {
          const opts = {
            method,
            headers: body ? { "Content-Type": "application/json" } : {},
          };
          if (body !== undefined) opts.body = JSON.stringify(body);
          const res = await fetch(url, opts);
          const data = await parseJsonResponse(res);
          if (!res.ok) {
            const msg =
              (data && (data.error || data.detail)) ||
              res.statusText ||
              "Request failed";
            throw new Error(typeof msg === "string" ? msg : JSON.stringify(msg));
          }
          return data;
        } finally {
          setLoading(false);
        }
      }

      function formatDate(iso) {
        if (!iso) return "—";
        try {
          const d = new Date(iso);
          if (Number.isNaN(d.getTime())) return "—";
          return d.toLocaleString(undefined, {
            dateStyle: "medium",
            timeStyle: "short",
          });
        } catch {
          return "—";
        }
      }

      function statusBadgeClass(status) {
        if (status === "In Progress") return "badge-progress";
        if (status === "Completed") return "badge-done";
        return "badge-not";
      }

      function validateAddForm() {
        const name = document.getElementById("add-name").value.trim();
        const description = document.getElementById("add-description").value.trim();
        const target_date = document.getElementById("add-target_date").value;
        const status = document.getElementById("add-status").value;
        if (!name) return "Please enter a course name.";
        if (!description) return "Please enter a description.";
        if (!target_date) return "Please choose a target date.";
        if (!status || !STATUS_OPTIONS.includes(status)) return "Please select a valid status.";
        return null;
      }

      function validateEditForm() {
        const name = els.editName.value.trim();
        const description = els.editDescription.value.trim();
        const target_date = els.editTarget.value;
        const status = els.editStatus.value;
        if (!name) return "Please enter a course name.";
        if (!description) return "Please enter a description.";
        if (!target_date) return "Please choose a target date.";
        if (!status || !STATUS_OPTIONS.includes(status)) return "Please select a valid status.";
        return null;
      }

      function renderCourses(courses) {
        els.courseList.innerHTML = "";
        if (!Array.isArray(courses) || courses.length === 0) {
          const p = document.createElement("p");
          p.className = "empty full";
          p.style.gridColumn = "1 / -1";
          p.textContent = "No courses yet. Add one above.";
          els.courseList.appendChild(p);
          return;
        }

        courses.forEach(function (c) {
          const card = document.createElement("article");
          card.className = "card";
          card.dataset.id = String(c.id);

          const title = document.createElement("h3");
          title.textContent = c.name || "(Untitled)";
          card.appendChild(title);

          const desc = document.createElement("p");
          desc.className = "desc";
          desc.textContent = c.description || "";
          card.appendChild(desc);

          const badge = document.createElement("span");
          badge.className = "badge " + statusBadgeClass(c.status);
          badge.textContent = c.status || "—";
          card.appendChild(badge);

          const meta = document.createElement("div");
          meta.className = "meta";
          meta.innerHTML =
            "<div><strong>Target:</strong> " +
            (c.target_date || "—") +
            "</div>" +
            "<div><strong>Created:</strong> " +
            formatDate(c.created_at) +
            "</div>" +
            "<div><strong>ID:</strong> " +
            c.id +
            "</div>";
          card.appendChild(meta);

          const actions = document.createElement("div");
          actions.className = "card-actions";

          const editBtn = document.createElement("button");
          editBtn.type = "button";
          editBtn.className = "btn btn-success";
          editBtn.textContent = "Edit";
          editBtn.addEventListener("click", function () {
            openEditModal(c);
          });

          const delBtn = document.createElement("button");
          delBtn.type = "button";
          delBtn.className = "btn btn-danger";
          delBtn.textContent = "Remove";
          delBtn.addEventListener("click", function () {
            removeCourse(c);
          });

          actions.appendChild(editBtn);
          actions.appendChild(delBtn);
          card.appendChild(actions);

          els.courseList.appendChild(card);
        });
      }

      async function loadCourses() {
        clearMessages();
        try {
          const data = await apiRequest("GET", API_BASE);
          renderCourses(data);
        } catch (e) {
          showMessage("Could not load courses: " + e.message, "error");
          els.courseList.innerHTML =
            '<p class="empty" style="grid-column:1/-1">Failed to load. Check the server and refresh.</p>';
        }
      }

      els.addForm.addEventListener("submit", async function (ev) {
        ev.preventDefault();
        clearMessages();
        const err = validateAddForm();
        if (err) {
          showMessage(err, "error");
          return;
        }
        const payload = {
          name: document.getElementById("add-name").value.trim(),
          description: document.getElementById("add-description").value.trim(),
          target_date: document.getElementById("add-target_date").value,
          status: document.getElementById("add-status").value,
        };
        try {
          await apiRequest("POST", API_BASE, payload);
          showMessage("Course added successfully.", "success");
          els.addForm.reset();
          await loadCourses();
        } catch (e) {
          showMessage(e.message, "error");
        }
      });

      function openEditModal(course) {
        els.editId.value = String(course.id);
        els.editName.value = course.name || "";
        els.editDescription.value = course.description || "";
        els.editTarget.value = course.target_date || "";
        els.editStatus.value = STATUS_OPTIONS.includes(course.status)
          ? course.status
          : "Not Started";
        els.editCreated.textContent = formatDate(course.created_at);
        els.modalBackdrop.classList.add("visible");
        els.modalBackdrop.setAttribute("aria-hidden", "false");
        els.editName.focus();
      }

      function closeEditModal() {
        els.modalBackdrop.classList.remove("visible");
        els.modalBackdrop.setAttribute("aria-hidden", "true");
      }

      els.editCancel.addEventListener("click", closeEditModal);
      els.modalBackdrop.addEventListener("click", function (ev) {
        if (ev.target === els.modalBackdrop) closeEditModal();
      });

      els.editForm.addEventListener("submit", async function (ev) {
        ev.preventDefault();
        clearMessages();
        const err = validateEditForm();
        if (err) {
          showMessage(err, "error");
          return;
        }
        const id = els.editId.value;
        const url = API_BASE + "/" + encodeURIComponent(id);
        const payload = {
          name: els.editName.value.trim(),
          description: els.editDescription.value.trim(),
          target_date: els.editTarget.value,
          status: els.editStatus.value,
        };
        try {
          await apiRequest("PUT", url, payload);
          showMessage("Course updated.", "success");
          closeEditModal();
          await loadCourses();
        } catch (e) {
          showMessage(e.message, "error");
        }
      });

      async function removeCourse(course) {
        clearMessages();
        const ok = window.confirm(
          'Delete "' + (course.name || "this course") + '"? This cannot be undone.'
        );
        if (!ok) return;
        const url = API_BASE + "/" + encodeURIComponent(course.id);
        try {
          await apiRequest("DELETE", url);
          showMessage("Course removed.", "success");
          await loadCourses();
        } catch (e) {
          showMessage(e.message, "error");
        }
      }

      els.refreshBtn.addEventListener("click", function () {
        loadCourses();
      });

      document.addEventListener("keydown", function (ev) {
        if (ev.key === "Escape" && els.modalBackdrop.classList.contains("visible")) {
          closeEditModal();
        }
      });

      loadCourses();
    })();
  </script>
</body>
</html>
